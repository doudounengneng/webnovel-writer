name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install from root
        run: npm ci

      - name: Build core
        run: npm run build --workspace=@webnovel-writer/core

      - name: Build CLI
        run: npm run build --workspace=@webnovel-writer/cli

      - name: Typecheck core
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: Typecheck CLI
        run: npx tsc --noEmit -p packages/cli/tsconfig.json

      - name: Verify CLI loads
        run: node packages/cli/dist/index.js --version

      - name: Verify quickstart (mock)
        run: node packages/cli/dist/index.js quickstart --dir /tmp/test-novel

      - name: Verify estimate
        run: node packages/cli/dist/index.js estimate --chapters 100